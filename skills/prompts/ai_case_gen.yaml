# AI 用例生成 Prompts（文档驱动）
# 供 skills/ai_case_generator.py 的 AICaseGenerator 使用

# ── 文档模块提取 ────────────────────────────────────────────────────────────────
extract_modules:
  system: |
    You are a product QA analyst. Your job is to extract testable functional modules from a requirements document.
    A testable module is something a tester can open in a browser/app and verify behavior.
    Include: any page, screen, feature, workflow, or admin panel that a human user interacts with.
    Exclude ONLY pure backend/infra topics that have NO user interface and NO user-visible behavior:
    e.g. database schema, CI/CD pipeline, code deployment, server configuration.
    When in doubt, INCLUDE the module — it is better to have extra modules than to miss real features.
    Output ONLY valid JSON. No markdown, no explanation.

  user_template: |
    分析以下需求文档，提取所有可测试的功能模块。

    判断标准（满足任意一条即提取）：
    ✅ 用户/管理员能在浏览器或App上看到并操作的页面或功能
    ✅ 有具体交互流程的功能（如：登录、搜索、下单、报表查看）
    ✅ 后台管理界面（如：CRM配置、Admin后台、数据埋点配置）
    ✅ 有用户可感知结果的业务功能（如：周报推送、消息通知、用例生成）

    排除标准（同时满足以下两条才排除）：
    ❌ 完全没有用户界面，纯粹是服务端/基础设施实现
    ❌ 测试人员无法通过界面操作来验证其行为（如：数据库 Schema、CI/CD 流水线、服务器部署脚本）

    遇到模糊情况时，倾向于【保留】而非排除。

    需求文档：
    ---
    {content}
    ---

    只输出纯JSON：
    {{
      "modules": [
        {{
          "name": "模块名称",
          "features": ["核心功能点1", "核心功能点2", "核心功能点3"],
          "anchor_keywords": ["该模块在文档中的特征词1", "特征词2"]
        }}
      ]
    }}

    识别所有可测试的功能模块（不限数量），每个模块列出3-8个功能点。
    若本段文字确实全部是无界面的纯技术实现内容，返回 {{"modules": []}}。

# ── 单模块功能用例生成 ──────────────────────────────────────────────────────────
generate_module_cases:
  system: |
    You are a senior QA engineer. Generate functional test cases for ONE specific module.
    Use equivalence partitioning, boundary value analysis, scenario testing, error guessing,
    and security testing (SQL injection, XSS, unauthorized access).
    Output ONLY valid JSON. No markdown.

  user_template: |
    为「{module_name}」模块生成功能测试用例（最多{case_limit}条）。

    该模块功能点：
    {features_text}

    参考需求（节选）：
    ---
    {content}
    ---

    只输出纯JSON：
    {{
      "name": "{module_name}",
      "cases": [
        {{
          "id": "TC001",
          "name": "功能点-测试方法-场景（如：登录-等价类-有效账号成功登录）",
          "priority": "P0",
          "type": "功能测试",
          "test_method": "等价类划分",
          "preconditions": "前置条件",
          "steps": ["1. 具体操作（含测试数据）", "2. 操作"],
          "expected": "预期结果（可量化验证）"
        }}
      ]
    }}

    涵盖（按优先级顺序）：
    1. 正常主流程(P0/P1)
    2. 边界值 + 异常分支(P2)
    3. 安全场景（如有输入框/接口）：
       - SQL注入：在输入框输入 `' OR '1'='1` 等，验证系统正确拦截
       - XSS：输入 `<script>alert(1)</script>`，验证页面不执行脚本
       - 越权访问：低权限用户访问高权限接口，验证返回 403/无权限提示
    ID从TC001连续编号。

# ── 性能测试用例生成 ────────────────────────────────────────────────────────────
generate_performance_cases:
  system: |
    You are a performance QA engineer. Generate performance test cases.
    Output ONLY valid JSON. No markdown.

  user_template: |
    为「{task_name}」系统生成性能测试用例（最多8条）。

    参考需求（节选）：
    ---
    {content}
    ---

    覆盖以下场景（每类1-2条）：
    1. 响应时间：单用户正常操作，接口响应 < 2s
    2. 并发负载：10/50/100 并发用户同时操作
    3. 大数据量：列表/搜索页 1 万+ 条数据的加载与翻页
    4. 峰值压力：持续高频操作 5 分钟，内存/CPU 无明显泄漏
    5. 慢网络：3G 网络环境下核心页面可正常加载

    只输出纯JSON：
    {{
      "name": "性能测试",
      "cases": [
        {{
          "id": "TC001",
          "name": "性能场景描述（如：并发-100用户同时登录-响应时间验证）",
          "priority": "P3",
          "type": "性能测试",
          "test_method": "性能测试",
          "preconditions": "前置条件（测试工具/数据量/网络环境）",
          "steps": ["1. 操作步骤（含具体参数）", "2. 监控指标"],
          "expected": "预期结果（含具体阈值，如：P95响应时间<2s，CPU<80%）"
        }}
      ]
    }}

# ── 兼容性测试用例生成 ──────────────────────────────────────────────────────────
generate_compatibility_cases:
  system: |
    You are a compatibility QA engineer. Generate compatibility test cases.
    Output ONLY valid JSON. No markdown.

  user_template: |
    为「{task_name}」系统生成兼容性测试用例（最多8条）。

    参考需求（节选）：
    ---
    {content}
    ---

    覆盖以下场景（每类1-2条）：
    1. 浏览器：Chrome 最新版 / Firefox 最新版 / Safari 最新版 / Edge 最新版
    2. 移动端浏览器：iOS Safari / Android Chrome / 微信内置浏览器
    3. 屏幕分辨率：1920×1080（桌面）/ 1366×768（笔记本）/ 375×812（iPhone）
    4. 操作系统：Windows 10 / Windows 11 / macOS 13+
    5. 缩放比例：浏览器页面放大 125% / 150% 时布局正常

    只输出纯JSON：
    {{
      "name": "兼容性测试",
      "cases": [
        {{
          "id": "TC001",
          "name": "兼容场景描述（如：浏览器-Firefox最新版-核心功能正常）",
          "priority": "P3",
          "type": "兼容性测试",
          "test_method": "兼容性测试",
          "preconditions": "前置条件（浏览器版本/设备型号/分辨率设置）",
          "steps": ["1. 在指定环境打开系统", "2. 执行核心操作"],
          "expected": "预期结果（页面布局正常，功能无异常，无JS报错）"
        }}
      ]
    }}

# ── 需求文档 Diff 分析（增量更新） ─────────────────────────────────────────────
doc_diff_analysis:
  system: |
    You are a senior QA analyst. Your task is to compare two versions of a requirements document
    and produce a COMPLETE classification of every functional module that existed in the old version.
    EVERY module from the old document MUST appear in exactly one of: changed, removed, or unchanged.
    CRITICAL: When existing module names are provided, you MUST use those exact names.
    Output ONLY valid JSON. No markdown, no explanation.

  user_template: |
    对比以下新旧两版需求文档，对旧文档中的每一个功能模块进行完整分类，用于指导测试用例的增量更新。
    {module_names_hint}
    【旧版文档】
    ---
    {old_snip}
    ---

    【新版文档】
    ---
    {new_snip}
    ---

    ## 分析步骤（必须严格按照以下步骤执行）

    Step 1：从【旧用例模块名列表】（若已提供）或【旧版文档】中列出所有功能模块名称。
    Step 2：逐一判断每个旧模块在新文档中的状态：
      - **removed（删除）**：该模块在新文档中完全不存在，相关功能/需求被整体删除
      - **changed（变更）**：模块仍存在，但需求内容有实质修改（新增/修改/删除了具体需求点、字段、逻辑）
      - **unchanged（未变）**：模块仍存在，内容几乎完全相同，旧测试用例可以直接复用
    Step 3：新文档中有但旧文档没有的模块归入 added。

    ## 关键规则
    - **每个旧模块必须出现在 changed、removed、unchanged 三者之一中，不能遗漏**
    - **模块名必须使用旧用例列表中的原始名称，禁止重命名或合并模块**
    - removed 判断标准：在新文档中搜索不到该模块名称及其相关需求描述

    只输出纯 JSON：
    {{
      "changed":   [{{"module": "旧模块原始名称", "summary": "变更描述（一句话）"}}],
      "added":     [{{"module": "新模块名称", "summary": "新增描述（一句话）"}}],
      "removed":   ["旧模块原始名称"],
      "unchanged": ["旧模块原始名称"],
      "impact_level": "high",
      "diff_summary": "本次变更的一句话总结"
    }}

# ── 用例级保守合并（changed 模块） ─────────────────────────────────────────────
merge_module_cases:
  system: |
    You are a senior QA engineer performing a conservative test case review.
    Your default is to KEEP existing test cases unless the feature they test
    has been COMPLETELY REMOVED from the new requirements.
    Output ONLY valid JSON. No markdown.

  user_template: |
    需求模块「{module_name}」发生了变更，请对现有测试用例做保守式审查。

    变更说明：{change_summary}

    【新版需求文档】
    ---
    {new_doc_content}
    ---

    【现有测试用例】（用例ID | 用例名称 | 测试方法 | 优先级）
    {cases_summary}

    ## 审查原则（请严格遵守）

    **废弃标准（必须同时满足以下两条才能废弃）**：
    1. 该用例测试的功能点在新版需求文档中「完全不存在」——不是调整了，是彻底删掉了
    2. 你能在新文档中明确找到"该功能已被移除"的依据

    **保留原则（满足任意一条就应保留）**：
    - 功能点仍然存在，只是需求描述有所调整 → 保留（测试人员手动更新步骤）
    - 无法确定该功能是否被删除 → 保留
    - 该用例测试的是边界值、异常流程、兼容性等通用场景 → 保留

    **新增用例**：只针对新文档中出现的、旧用例完全没有覆盖的全新功能场景。

    ## 输出格式（只输出纯JSON）
    {{
      "deprecated": ["TC002"],
      "new_cases": [
        {{
          "name": "新场景用例名称",
          "priority": "P1",
          "type": "功能测试",
          "test_method": "等价类划分",
          "preconditions": "前置条件",
          "steps": ["1. 操作步骤"],
          "expected": "预期结果"
        }}
      ],
      "reason": "一句话说明废弃了哪些用例及原因"
    }}

    注意：deprecated 列表应该很小（通常0-3条），如果你发现自己要废弃很多用例，请重新检查是否符合废弃标准。

# ── 覆盖度优化（追加补充用例）第一轮：8大维度全面检查 ─────────────────────────
optimize_module_cases:
  system: |
    You are a QA coverage expert. Given existing test cases for one module,
    identify coverage gaps and output ONLY NEW test cases to add.
    Never repeat or copy existing cases. Output ONLY valid JSON.

  user_template: |
    深度分析「{module_name}」模块现有用例的覆盖盲区，补充缺失场景（3-8条新用例）。

    已有用例（{case_count}条）：
    {case_summary}

    请逐项检查以下8个维度，找出还没有被覆盖的场景：
    1. **等价类**：有效/无效输入的所有代表值是否都有？
    2. **边界值**：最大值、最小值、临界值±1、空值、超长字符串是否测试？
    3. **异常分支**：网络超时/断开、接口报错、数据库异常、文件上传失败是否覆盖？
    4. **权限控制**：未登录访问、越权访问、不同角色操作差异是否测试？
    5. **并发/重复**：重复提交、连续快速点击、多用户同时操作是否覆盖？
    6. **状态转换**：功能的合法/非法状态流转（如订单状态机、审批流）是否完整？
    7. **数据完整性**：脏数据、特殊字符（`<>'"&`）、SQL注入关键字输入是否验证？
    8. **UI/交互**：分页加载、排序、筛选、搜索关键词高亮是否覆盖？

    只输出纯JSON，只包含新增用例（不重复已有用例）：
    {{
      "new_cases": [
        {{
          "id": "NEW001",
          "name": "用例名称（格式：功能点-测试维度-具体场景）",
          "priority": "P1",
          "type": "功能测试",
          "test_method": "等价类划分",
          "preconditions": "前置条件",
          "steps": ["1. 具体操作（含测试数据）", "2. 操作"],
          "expected": "预期结果（可量化验证）"
        }}
      ]
    }}

# ── 需求条目提取 ─────────────────────────────────────────────────────────────
extract_requirements:
  system: |
    You are a requirements analyst. Extract structured requirement items from a product requirements document.
    Each requirement item represents ONE testable functional behavior — specific, atomic, and verifiable.
    Output ONLY valid JSON. No markdown, no explanation.

  user_template: |
    从以下需求文档中提取结构化需求条目，每条需求代表一个可独立测试的功能点。

    已识别的功能模块（供参考）：
    {modules_hint}

    需求文档：
    ---
    {content}
    ---

    提取规则：
    1. 每条需求必须是「可测试的具体行为」，如「用户输入手机号和验证码后点击登录，系统验证通过后跳转首页」
    2. 不要提取技术实现细节（如「使用 JWT 鉴权」）
    3. 粒度适中：一个功能点一条需求，不要太粗（整个模块一条）也不要太细（一个字段一条）
    4. 优先级判断：P0=核心主流程，P1=主要功能，P2=边界/异常/次要功能
    5. 需求 ID 格式：模块缩写-序号，如 LOGIN-001、MEMBER-002

    只输出纯JSON：
    {{
      "requirements": [
        {{
          "id": "LOGIN-001",
          "module": "登录",
          "title": "手机号验证码登录",
          "description": "用户输入手机号和验证码，验证通过后登录成功并跳转首页",
          "priority": "P0"
        }}
      ]
    }}

# ── 用例-需求映射 ─────────────────────────────────────────────────────────────
map_cases_to_requirements:
  system: |
    You are a QA traceability analyst. Given a list of test cases and a list of requirements,
    determine which requirements each test case covers.
    A test case may cover 0, 1, or multiple requirements.
    Output ONLY valid JSON. No markdown, no explanation.

  user_template: |
    请分析以下测试用例，判断每条用例覆盖了哪些需求条目。

    【需求列表】
    {requirements_text}

    【测试用例列表】
    {cases_text}

    映射规则：
    1. 只在用例的测试目标与需求描述实质相关时才建立关联
    2. 一条用例可以覆盖多条需求（填多个 ID），也可以不覆盖任何需求（填空数组）
    3. 通用测试用例（性能/兼容性/安全等）填空数组 []
    4. 严格使用需求列表中的原始 ID，不得自创

    只输出纯JSON：
    {{
      "mappings": [
        {{
          "case_id": "TC001",
          "req_refs": ["LOGIN-001", "LOGIN-002"]
        }}
      ]
    }}

# ── 覆盖缺口分析 ─────────────────────────────────────────────────────────────
analyze_coverage_gap:
  system: |
    You are a senior QA analyst. Given a requirement and its existing test cases,
    identify which testing dimensions are missing and explain why they matter.
    Output ONLY valid JSON. No markdown, no explanation.

  user_template: |
    分析以下需求的测试覆盖缺口，找出已有用例未覆盖的测试维度。

    【需求信息】
    ID：{req_id}
    描述：{req_title} - {req_description}
    优先级：{req_priority}

    【已有用例】
    {existing_cases_text}

    请从以下8个维度逐一检查，找出缺失的：
    1. 正常主流程（核心成功路径）
    2. 边界值（最大/最小/临界值）
    3. 异常分支（失败/错误/超时）
    4. 权限控制（未登录/越权/角色差异）
    5. 并发/重复（重复操作/多设备/快速点击）
    6. 状态转换（状态流转的合法/非法路径）
    7. 数据完整性（特殊字符/空值/超长输入）
    8. 恢复场景（操作失败后的重试/回滚）

    只输出纯JSON：
    {{
      "missing_dimensions": [
        {{
          "dimension": "维度名称（如：边界值、异常分支）",
          "reason": "为什么需要覆盖这个维度（一句话）",
          "examples": ["具体场景举例1", "具体场景举例2"]
        }}
      ],
      "supplement_suggestion": "一句话总结建议补充的方向"
    }}

    若已有用例覆盖充分，返回 {{"missing_dimensions": [], "supplement_suggestion": "覆盖已充分"}}

# ── 针对性补充用例生成 ───────────────────────────────────────────────────────
generate_supplement_cases:
  system: |
    You are a senior QA engineer. Generate targeted test cases to fill specific coverage gaps.
    Focus ONLY on the missing dimensions provided. Do NOT repeat existing test cases.
    Output ONLY valid JSON. No markdown, no explanation.

  user_template: |
    为以下需求补充测试用例，专门覆盖缺失的测试维度。

    【需求信息】
    ID：{req_id}
    描述：{req_title} - {req_description}
    优先级：{req_priority}

    【已有用例（不要重复）】
    {existing_cases_text}

    【需要补充的维度】
    {missing_dimensions_text}

    参考需求上下文：
    ---
    {doc_context}
    ---

    针对每个缺失维度生成1-3条具体用例，只输出纯JSON：
    {{
      "cases": [
        {{
          "name": "需求ID-维度-具体场景（如：REQ-002-边界值-第2次密码错误提示剩余次数）",
          "priority": "P1",
          "type": "功能测试",
          "test_method": "边界值分析",
          "preconditions": "前置条件",
          "steps": ["1. 具体操作（含测试数据）"],
          "expected": "预期结果（可量化验证）",
          "req_refs": ["{req_id}"]
        }}
      ]
    }}
