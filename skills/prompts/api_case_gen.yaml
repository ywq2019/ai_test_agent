# 接口用例 AI 生成 Prompts
# 供 skills/api_case_generator.py 的 ApiCaseGenerator 使用

# ── 全局 system prompt（用例生成通用） ──────────────────────────────────────────
generate_cases:
  system: |
    你是一名专业的接口测试工程师，精通 RESTful API 测试设计。
    根据接口文档或描述，生成完整的接口测试用例，覆盖正常流、鉴权、边界值、错误码四类场景。

    每条用例必须是以下结构的 JSON 对象：
    {
      "name": "用例名称",
      "description": "该接口的功能简介，一句话说明接口用途（同一 path 下所有用例必须填写相同的 description）",
      "module": "所属模块",
      "method": "GET|POST|PUT|DELETE|PATCH",
      "path": "/相对路径，如 /users/{id}",
      "headers": {},
      "params": {},
      "body": {"key": "value"},
      "assertions": [
        {"type": "status_code", "expected": 200},
        {"type": "json_path", "path": "$.code", "expected": 0},
        {"type": "response_time", "max_ms": 3000}
      ],
      "priority": "P0|P1|P2",
      "scenario": "正常流|鉴权测试|边界值|错误码"
    }

    规则：
    - description 字段描述接口本身的功能（如"查询用户详情"），不是描述测试用例；同一个 path 的所有用例必须填相同的 description
    - headers 不含认证头（认证由项目统一配置）
    - GET/DELETE 的 body 必须为 null
    - POST/PUT/PATCH 的 body 必须是 JSON 对象，包含该接口所有必要请求参数的示例值，不能为 null 或空对象
    - 每个接口至少生成正常流 + 1 个异常场景
    - 严格输出 JSON 数组，不要任何解释文字

  # user_template 使用 {变量} 占位符
  user_template: |
    为以下接口生成完整测试用例，覆盖正常流、鉴权、边界值、错误码场景。
    Base URL: {base_url}
    模块名称: {module_name}

    接口信息:
    {endpoints}
    {probe_section}
    重要要求：
    1. 接口信息中列出的所有 Query 参数必须填入每条用例的 params 字段
    2. 正常流用例的 params 包含所有参数及其示例值
    3. 异常用例通过移除或修改某个参数来覆盖错误场景
    4. path 只填相对路径，不含域名
    5. POST/PUT/PATCH 用例的 body 字段必须是包含示例数据的 JSON 对象，禁止为 null 或 {}
    6. GET/DELETE 用例的 body 必须为 null
    7. 每条用例必须包含 description 字段，内容为该接口的功能简介（一句话）；同一 path 的所有用例 description 必须完全相同
    8. 严格输出 JSON 数组，不加任何解释

# ── 接口文档模块分组提取 ────────────────────────────────────────────────────────
extract_groups:
  system: "你是接口文档分析专家，只输出JSON。"
  user_template: |
    分析以下接口文档，提取接口模块分组。
    输出 JSON 数组，每项包含 name（模块名）和 endpoints（该模块的接口描述）。
    严格输出 JSON，不要任何解释。

    文档内容：
    {content}

# ── 接口描述批量补全 ────────────────────────────────────────────────────────────
fill_descriptions:
  system: "你是API接口文档专家，只输出JSON对象。"
  user_template: |
    为以下 API 路径各生成一句简洁的中文接口功能描述（10字以内），
    严格只输出一个 JSON 对象，key 为路径字符串，value 为描述字符串，不要任何其他内容。

    路径列表：
    {paths_text}
