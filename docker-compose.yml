version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ai-test-db
    environment:
      POSTGRES_DB: uitest
      POSTGRES_USER: uitest
      POSTGRES_PASSWORD: uitest123456
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uitest -d uitest"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-test-agent
    ports:
      - "4000:4000"
    env_file:
      - .env.docker
    volumes:
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pg_data:
    driver: local
  app_data:
    driver: local
